<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Desk</title>
    <link rel="stylesheet" href="styles.css?v=sticky-note-20260512">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Project Desk</p>
          <h1>Task command center</h1>
          <p class="sync-status" id="sync-status">Loading local project data...</p>
        </div>
        <div class="topbar-actions">
          <button class="secondary-button" id="notification-permission" type="button">Enable notifications</button>
          <button class="primary-button" id="new-task-button" type="button">New task</button>
        </div>
      </header>

      <main class="workspace">
        <section class="main-panel">
          <section class="home-todo-window" aria-label="Home to-do list">
            <div class="home-todo-header">
              <div class="home-todo-title-row">
                <label class="home-todo-title-label">
                  To-do list title
                  <input id="home-todo-title" type="text" autocomplete="off">
                </label>
              </div>
              <div class="todo-mode-toggle" role="group" aria-label="To-do list mode">
                <button class="mode-button" type="button" data-todo-mode="notes" aria-pressed="true">Free type</button>
                <button class="mode-button" type="button" data-todo-mode="checklist" aria-pressed="false">Checklist</button>
              </div>
            </div>
            <textarea id="home-todo-notes" class="home-todo-notes" rows="12" aria-label="Free type to-do list"></textarea>
            <div class="home-todo-checklist-shell" id="home-todo-checklist-shell" hidden>
              <div id="home-todo-checklist" class="home-todo-checklist"></div>
              <div class="home-todo-checklist-actions">
                <button class="secondary-button" id="home-todo-add-item" type="button">Add item</button>
                <button class="ghost-button" id="home-todo-add-header" type="button">Add sub-header</button>
              </div>
            </div>
          </section>

          <div class="toolbar">
            <label class="search-label">
              Search
              <input id="search-input" type="search">
            </label>
            <label>
              Project
              <select id="project-filter">
                <option value="all">All projects</option>
              </select>
            </label>
            <label>
              Due
              <select id="due-filter">
                <option value="all">All due dates</option>
                <option value="overdue">Overdue</option>
                <option value="today">Due today</option>
                <option value="week">Due this week</option>
                <option value="none">No due date</option>
              </select>
            </label>
            <button class="secondary-button toolbar-button" id="add-list-button" type="button">New list</button>
          </div>

          <div class="summary-strip" id="summary-strip" aria-live="polite"></div>

          <div class="board" id="board" aria-label="Task board"></div>
        </section>

        <aside class="right-panel" aria-label="Team 1:1s">
          <section class="panel-section one-on-one-section">
            <h2>Team 1:1s</h2>
            <div id="one-on-one-list" class="one-on-one-list" aria-label="Team 1:1 list"></div>
          </section>
          <section class="panel-section sticky-note-section">
            <h2>Sticky Note</h2>
            <textarea id="sticky-note-text" class="sticky-note-text" rows="8" aria-label="Sticky Note"></textarea>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="task-dialog" class="task-dialog">
      <form class="dialog-shell" id="edit-task-form">
        <div class="dialog-header">
          <div>
            <p class="eyebrow" id="dialog-mode">Edit task</p>
            <h2 id="dialog-title">Task</h2>
          </div>
          <button class="icon-button" id="close-dialog" aria-label="Close dialog" type="button">x</button>
        </div>

        <input id="edit-task-id" type="hidden">
        <label>
          Task name
          <input id="edit-title" type="text" required>
        </label>
        <label>
          Project
          <input id="edit-project" type="text">
        </label>
        <label>
          Notes
          <textarea id="edit-notes" rows="4"></textarea>
        </label>
        <div class="two-column">
          <label>
            Status
            <select id="edit-status">
              <option value="todo">To do</option>
              <option value="active">In progress</option>
              <option value="waiting">Waiting</option>
              <option value="done">Done</option>
            </select>
          </label>
          <label>
            Priority
            <select id="edit-priority">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </label>
        </div>
        <label>
          Due date
          <input id="edit-due" type="datetime-local">
        </label>
        <label>
          Reminder time
          <input id="edit-reminder" type="datetime-local">
        </label>

        <div class="linked-todo-editor">
          <div class="section-heading-row">
            <h3>Linked to-do checklist</h3>
          </div>
          <label>
            To-do subheader
            <select id="edit-linked-todo"></select>
          </label>
          <div id="edit-linked-todo-preview" class="edit-linked-todo-preview" hidden></div>
          <div id="edit-linked-todo-note-log" class="edit-linked-todo-note-log" hidden></div>
        </div>

        <div class="checklist-editor">
          <div class="section-heading-row">
            <h3>Checklists</h3>
            <button class="ghost-button" id="add-checklist-item" type="button">Add checklist</button>
          </div>
          <div id="edit-checklist-list" class="edit-checklist-list"></div>
        </div>

        <div class="dialog-actions">
          <button class="danger-button" id="delete-task" type="button">Delete</button>
          <div>
            <button class="secondary-button" id="cancel-edit" type="button">Cancel</button>
            <button class="primary-button" id="save-task" value="default" type="button">Save</button>
          </div>
        </div>
      </form>
    </dialog>

    <script src="app.js?v=sticky-note-20260512"></script>
  </body>
</html>
